<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guvensiz XSS Ornegi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Guvensiz Yorum Sayfasi</h1>
            <p class="warning">
                Bu sayfa bilerek guvensiz yapilmistir. Kullanici girdisi dogrudan gosterilir.
            </p>

            <form method="POST">
                <label>Kullanici Adi</label>
                <input type="text" name="username" required>

                <label>Yorum</label>
                <textarea name="comment" rows="4" required></textarea>

                <div class="button-group">
                    <button class="btn btn-danger" type="submit">Yorum Gonder</button>
                    <a class="btn btn-dark" href="/">Ana Sayfa</a>
                </div>
            </form>

            <hr>

            <h2>Yorumlar</h2>

            {% for item in comments %}
                <div class="comment-box">
                    <strong>{{ item.username|safe }}</strong>
                    <p>{{ item.comment|safe }}</p>
                </div>
            {% else %}
                <p>Henuz yorum yok.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
